<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./make-todo.css" />

    <script src="../dist/make-todo.js" defer></script>

    <title>UMC Todo</title>
  </head>

  <body>
    <div class="todo-container">
      <header class="todo-container__header">YEON TODO</header>

      <form id="todo-form" class="todo-container__form">
        <input
          type="text"
          id="todo-input"
          class="todo-container__input"
          placeholder="할 일을 입력해주세요"
          required
        />
        <button type="submit" class="todo-container__button">할일 추가</button>
      </form>

      <div class="list-container">
        <div class="todo-container__section">
          <div class="todo-container__title">할 일</div>
          <div id="todo-list" class="todo-container__items"></div>
        </div>

        <div class="complete-container__section">
          <div class="complete-container__title">완료</div>
          <div id="complete-list" class="complete-container__items"></div>
        </div>
      </div>
    </div>
  </body>
</html>
