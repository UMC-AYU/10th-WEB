<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Todo List 구현</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main class="container">
            <header class="header">
                <h1 class="header__title">UMC Study Plan</h1>
            </header>
            
            <input 
                id="todoInput"
                class="todo-input"
                type="text"
                placeholder="스터디 계획을 작성해 보세요!" 
            />

            <section class="todo-section">
                <h2>해야 할 일</h2>
                <ul id="todoList" class="todo-list"></ul>
            </section>
            
            <section class="todo-section">
                <h2>완료된 일</h2>
                <ul id="doneList" class="todo-list"></ul>
            </section>
        </main>
        <script src="app.js"></script>
    </body>
</html>
