<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>안양대학교 Navigation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <nav class="header__nav">

      <div class="header__left">
        <div class="header__logo-box">
          <img src="../../svg/ayu-logo.svg" alt="AYU 로고" class="header__logo" />
        </div>
        <div class="header__brand">안양대학교</div>
      </div>

      <ul class="header__menu">
        <li class="header__menu-item">아냥대 친구들</li>
        <li class="header__menu-item">패치 노트</li>
        <li class="header__menu-item header__menu-item--active">앱 다운로드</li>
      </ul>

      <div class="header__actions">
        <div class="header__lang-toggle">
          <span class="header__lang-label">언어</span>
          <div class="header__lang-buttons">
            <button class="header__lang-button header__lang-button--active">KO</button>
            <button class="header__lang-button">EN</button>
          </div>
        </div>
      </div>
    </nav>
  </header>
</body>
</html>
